<div class="app-custom-value">
  <div class="toggle-btn-container">
    <button class="toggle-btn" (click)="showdiv()">{{ (custometoggle$ | async) ? '-' : '+'}}</button>
  </div>

@if(custometoggle$){
  <div class="custom-input-container">
    <input type="text" [(ngModel)]="cusstomeValue">
    <button class="btn-increment" (click)="onButtonClickIncrement()" >
        Increment By
    </button>
  </div>
}
</div>
