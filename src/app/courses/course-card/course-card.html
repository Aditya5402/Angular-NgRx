<div class="course-card">
    <div class="course-title">
        {{course?.title}}
    </div>
    <div class="course-image">
        <img [src]="course?.image" width="350px" height="200px" >
    </div>
    <div class="course-description">
        <h5>About this Course</h5>
        <div class="course-description-text">
            <p>{{course?.description}}</p>
        </div>
    </div>
    <div class="course-card-footer">
        <div class="course-price">
           {{course?.price}}
        </div>
        <div class="corurse-actions">
            <button class="btn-action course-view"><fa-icon [icon]="faPlus"></fa-icon></button>
            <button class="btn-action course-edit"><fa-icon [icon]="faPencil"></fa-icon></button>  
            <button class="btn-action course-delete"><fa-icon [icon]="faTrash"></fa-icon></button>
        </div>
    </div>
</div>
