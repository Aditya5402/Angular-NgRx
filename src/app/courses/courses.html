<div class="course-container">
    <div class="course-page-header">
           <div class="course-header-text">
              <h2>All Courses</h2>
           </div>
           <div class="course-header-search">
               <input type="text" name="" placeholder="Search Courses">
               <button>Search</button>
           </div>
           <div class="course-header-search" >
               <button class="create-course-btn" (click)="showCreateForm()">Create Course</button>
           </div>
    </div>

    <div class="course-list-container">
        
@for (course of courses$ | async; track course.id) {
    <app-course-card [course]="course" ></app-course-card>
}
    </div>
</div>

@if(showForm$ | async){
    <app-add-course></app-add-course>
}
